<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Eric's Lounge</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="theme-color" content="#F2622E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eric's Lounge">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F3EADD;
    --cream-2:#E8D6BC;
    --card:#FBF5EA;
    --ink:#3D2A22;
    --ink-solid:#3D2A22;
    --ink-soft:#856F5C;
    --coral:#7A2E35;
    --coral-dark:#5C2530;
    --gold:#D4AF37;
    --teal:#6B7A3D;
    --line:#E0CBA4;
    --arsenal:#EF0107;

    --f-jur:#7A2E35;
    --f-ir:#C9A227;
    --f-econ:#6B7A3D;
    --f-biz:#B08D57;
    --f-sci:#8C3F4E;
    --f-it:#A8A090;
    --f-psy:#D4AF37;
    --f-des:#56642E;
    --f-hist:#5C2530;
    --f-travel:#9A9280;
    --f-tech:#7A6656;
    --f-sport:#6B7A3D;
  }

  body.dark-mode{
    --cream:#1C1512;
    --cream-2:#2A1F19;
    --card:#2A1F19;
    --ink:#EFE3D3;
    --ink-soft:#B8A48E;
    --line:#3E2E24;
    --coral-dark:#E38A93;
    --coral:#D9707B;
    --teal:#9CB06A;
    --gold:#E8C766;
  }
  body.dark-mode header{
    background:linear-gradient(135deg, #33241D 0%, #2A1F19 60%, #241A15 100%);
    border-bottom-color:#3E2E24;
  }
  body.dark-mode .fac-tile,
  body.dark-mode .stat-pill,
  body.dark-mode .sport-hub-tile{
    box-shadow:0 3px 0 rgba(0,0,0,.3);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Nunito', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Baloo 2', sans-serif; margin:0;}
  a{color:inherit;}

  .wrap{max-width:1040px; margin:0 auto; padding:0 22px;}

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg, #E8CFAE 0%, #DEBE93 60%, #D0AA79 100%);
    padding:36px 0 26px 0;
    border-bottom:4px solid var(--card);
  }
  .masthead{text-align:center;}
  h1.title{
    font-size:clamp(38px,7vw,62px);
    font-weight:800;
    color:var(--coral-dark);
    letter-spacing:-0.01em;
    cursor:pointer;
  }
  .subtitle{
    font-size:16px;
    font-weight:600;
    color:var(--ink-soft);
    margin-top:8px;
  }

  .stat-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-top:24px;
  }
  .stat-pills{
    display:flex;
    gap:14px;
    flex:1;
    max-width:520px;
  }
  .stat-pill{
    background:var(--card);
    border-radius:18px;
    padding:10px 14px;
    display:flex;
    flex:1;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
    text-align:center;
  }
  .stat-pill .label{
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .stat-pill .value{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:15px;
    color:var(--coral-dark);
    white-space:nowrap;
  }
  .stat-pill .date{
    font-family:'Space Mono', monospace;
    font-weight:600;
    font-size:11px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .stat-pill.weekend .value{color:var(--teal);}

  /* ---------- Section shell ---------- */
  section{padding:34px 0;}
  .section-head{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin-bottom:18px;
  }
  .section-head h2{
    min-width:0;
    font-size:22px;
    color:var(--ink);
  }
  .section-head .emoji{display:inline-flex; align-items:center;} .section-head .emoji svg{width:22px;height:22px;}
  .section-sub{
    font-size:13px;
    color:var(--ink-soft);
    font-weight:600;
    margin-left:auto;
  }
  .section-link{
    font-size:13px;
    font-weight:700;
    color:var(--coral-dark);
    text-decoration:none;
    margin-left:auto;
    cursor:pointer;
  }
  .section-link:hover{text-decoration:underline;}

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-weight:700;
    font-size:14px;
    color:var(--coral-dark);
    text-decoration:none;
    cursor:pointer;
    margin-bottom:6px;
  }
  .back-link:hover{text-decoration:underline;}

  /* ---------- Faculty tiles ---------- */
  .faculties{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }
  @media (max-width:700px){ .faculties{grid-template-columns:repeat(2,1fr);} }

  .fac-tile{
    background:var(--card);
    border:none;
    border-radius:18px;
    padding:16px 16px;
    cursor:pointer;
    text-align:left;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
    transition:transform .12s ease, box-shadow .12s ease;
    font-family:'Nunito', sans-serif;
    text-decoration:none;
    display:block;
    color:var(--ink);
  }
  .fac-tile:hover{transform:translateY(-2px); box-shadow:0 6px 0 rgba(58,42,30,.1);}
  .fac-icon{
    display:inline-flex;
    vertical-align:-4px;
    margin-right:8px;
  }
  .fac-icon svg{display:block; width:16px; height:16px;}
  .section-head .fac-icon{margin-right:0; vertical-align:-3px;}
  .section-head .fac-icon svg{width:20px; height:20px;}
  .fac-tile .name{font-weight:700; font-size:14.5px;}
  .fac-tile .count{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
    display:block;
  }
  .fac-tile.all{background:var(--ink-solid); grid-column:1/-1;}
  .fac-tile.all .name{color:#fff;}
  .fac-tile.all .count{color:#D8CBBB;}

  /* ---------- Sports hub tiles: uniform size, dead-centered ---------- */
  .sport-hub-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .sport-hub-tile{
    background:var(--card);
    border:none;
    border-radius:18px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
    transition:transform .12s ease, box-shadow .12s ease;
    font-family:'Nunito', sans-serif;
    text-decoration:none;
    color:var(--ink);
    height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:12px;
  }
  .sport-hub-tile:hover{transform:translateY(-2px); box-shadow:0 6px 0 rgba(58,42,30,.1);}
  .sport-hub-tile .name{font-weight:700; font-size:15px; line-height:1.25;}
  .hub-icon{display:inline-flex; vertical-align:-4px;}

  /* ---------- Feed ---------- */
  .day-badge{
    display:inline-block;
    background:var(--ink-solid);
    color:#fff;
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:.05em;
    padding:5px 14px;
    border-radius:999px;
    margin:22px 0 12px 0;
  }
  .day-badge:first-child{margin-top:0;}

  .entry{
    display:flex;
    flex-direction:column;
    gap:8px;
    background:var(--card);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .entry-top{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .tag{
    flex:0 0 120px;
    width:120px;
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:.04em;
    text-transform:uppercase;
    padding:6px 8px;
    border-radius:999px;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  a.headline{
    flex:1;
    min-width:0;
    font-weight:700;
    font-size:16px;
    color:var(--ink);
    text-decoration:none;
    line-height:1.35;
  }
  a.headline:hover{color:var(--coral);}
  .entry-meta{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-left:134px;
    line-height:1.6;
  }
  .entry-actions{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:6px;
    margin-left:134px;
    margin-right:12px;
  }
  .react-btn{
    background:var(--cream-2);
    border:none;
    border-radius:999px;
    box-sizing:border-box;
    height:32px;
    padding:0 10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    cursor:pointer;
    line-height:1;
  }
  .react-btn.active{background:var(--coral); }
  .bookmark-btn{
    background:var(--cream-2);
    border:none;
    border-radius:999px;
    box-sizing:border-box;
    height:32px;
    padding:0 10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    cursor:pointer;
    line-height:1;
  }
  .bookmark-btn.active{background:var(--gold);}
  .share-btn{
    background:none;
    border:1px solid var(--line);
    border-radius:999px;
    box-sizing:border-box;
    height:32px;
    padding:0 13px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-family:'Space Mono', monospace;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .share-btn:hover{color:var(--coral);}

  /* ---------- Search ---------- */
  .search-input{
    width:100%;
    padding:14px 16px;
    border-radius:16px;
    border:none;
    background:var(--card);
    font-family:'Nunito', sans-serif;
    font-size:15px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .search-input:focus{outline:2px solid var(--coral);}
  .search-icon-btn{
    background:var(--card);
    border:none;
    border-radius:999px;
    width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }

  /* ---------- On this day ---------- */
  .otd-card{
    background:var(--ink-solid);
    color:#fff;
    border-radius:20px;
    padding:22px;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .weather-row{padding:8px 0;}
  .weather-row + .weather-row{border-top:1px solid rgba(255,255,255,.15);}
  .weather-city{font-family:'Space Mono', monospace; font-size:12px; text-transform:uppercase; letter-spacing:.04em; opacity:.75; margin-bottom:2px;}
  .weather-detail{font-weight:700; font-size:15px;}
  .otd-card .otd-year{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--gold);
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  .otd-card .otd-text{
    margin-top:8px;
    font-size:15px;
    line-height:1.5;
    font-weight:600;
  }
  .otd-card a{color:#fff; text-decoration:underline;}



  /* ---------- Random tile ---------- */
  .random-tile{
    background:var(--coral);
    color:#fff;
    border:none;
    border-radius:20px;
    padding:20px 22px;
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    text-align:left;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
    font-family:'Nunito', sans-serif;
  }
  .random-tile .icon{display:inline-flex; align-items:center;} .random-tile .icon svg{width:26px;height:26px;}
  .random-tile .title{font-weight:800; font-size:17px;}
  .random-tile .sub{font-size:12px; color:#FBDFCF; font-weight:600; margin-top:2px;}

  .empty-card{
    background:var(--card);
    border-radius:18px;
    padding:34px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-weight:600;
    font-size:14px;
  }

  /* ---------- Sports ---------- */
  .sports-card{
    background:var(--card);
    border-radius:20px;
    padding:14px 20px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .sports-header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
  }
  .sports-header .crest{
    width:84px; height:84px;
    display:flex; align-items:center; justify-content:center;
  }
  .sports-header .crest img{width:100%; height:100%; object-fit:contain;}
  .sports-header .name{font-weight:800; font-size:17px;}
  .sports-header .sub{font-size:12px; color:var(--ink-soft); font-weight:600;}

  .next-fixture{
    background:var(--cream-2);
    border-radius:14px;
    padding:12px 14px;
    font-size:13.5px;
    font-weight:700;
  }
  .next-fixture .label{
    display:block;
    font-family:'Space Mono', monospace;
    font-size:10px;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:4px;
    font-weight:400;
  }

  /* ---------- Student of the week ---------- */
  .sotw-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:14px;
  }
  .sotw-card{
    background:var(--card);
    border-radius:20px;
    padding:22px;
    display:flex;
    gap:18px;
    align-items:center;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .sotw-photo{
    width:96px; height:96px;
    border-radius:50%;
    background:var(--cream-2);
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    border:3px solid var(--gold);
  }
  .sotw-photo img{width:100%; height:100%; object-fit:cover;}
  .sotw-photo .placeholder{font-size:34px;}
  .sotw-name{font-weight:800; font-size:19px;}
  .sotw-note{color:var(--ink-soft); font-size:13.5px; margin-top:4px; font-weight:600;}

  /* ---------- Recommend ---------- */
  .rec-list{display:flex; flex-direction:column; gap:10px;}
  .rec-item{
    background:var(--card);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .rec-item a{
    font-weight:700;
    font-size:15px;
    text-decoration:none;
    color:var(--ink);
  }
  .rec-item a:hover{color:var(--coral);}
  .rec-item .rec-note{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:4px;
    font-weight:600;
  }

  /* ---------- Watch ---------- */
  .watch-tile{
    background:var(--ink-solid);
    color:#fff;
    border-radius:20px;
    padding:26px 22px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .watch-tile .icon{display:inline-flex; align-items:center;} .watch-tile .icon svg{width:30px;height:30px;}
  .watch-tile .title{font-weight:800; font-size:19px;}
  .watch-tile .sub{font-size:13px; color:#D8CBBB; font-weight:600; margin-top:2px;}

  /* ---------- Photo Library ---------- */
  .photo-tile{
    background:var(--f-des);
    color:#fff;
    border-radius:20px;
    padding:26px 22px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .photo-tile .icon{display:inline-flex; align-items:center;} .photo-tile .icon svg{width:30px;height:30px;}
  .photo-tile .title{font-weight:800; font-size:19px;}
  .photo-tile .sub{font-size:13px; color:#FBE4D1; font-weight:600; margin-top:2px;}

  .goodnews-tile{
    background:var(--gold);
    color:#fff;
    border-radius:20px;
    padding:26px 22px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .goodnews-tile .icon{display:inline-flex; align-items:center;} .goodnews-tile .icon svg{width:30px;height:30px;}
  .goodnews-tile .title{font-weight:800; font-size:19px;}
  .goodnews-tile .sub{font-size:13px; color:#FFF3DC; font-weight:600; margin-top:2px;}

  .photo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:10px;
  }
  .photo-item{
    display:block;
    text-decoration:none;
    background:var(--card);
    border:none;
    padding:0;
    font:inherit;
    cursor:pointer;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .photo-item img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
  }

  /* ---------- Photo lightbox ---------- */
  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,6,4,.94);
    z-index:9999;
  }
  .lightbox.active{display:block;}
  .lightbox-close{
    position:fixed;
    top:16px;
    right:16px;
    z-index:10001;
    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    color:#fff;
    border:none;
    font-size:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .lightbox-track{
    display:flex;
    height:100%;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .lightbox-slide{
    flex:0 0 100%;
    scroll-snap-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 20px;
    box-sizing:border-box;
  }
  .lightbox-slide img{
    max-width:100%;
    max-height:88vh;
    object-fit:contain;
    border-radius:12px;
    display:block;
  }
  .photo-caption{
    padding:8px 10px 10px 10px;
    font-size:12px;
    font-weight:700;
    color:var(--ink);
    line-height:1.3;
  }

  .watch-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
  }
  .watch-card{
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
    display:block;
  }
  .watch-thumb{
    width:100%;
    aspect-ratio:16/9;
    background:var(--cream-2);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    border:none;
    padding:0;
  }
  .watch-thumb iframe{width:100%; height:100%; border:none; display:block;}
  .watch-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .watch-thumb .play{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.15);
  }
  .watch-thumb .play span{
    width:44px; height:44px;
    border-radius:50%;
    background:var(--coral);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }
  .watch-info{padding:10px 12px 14px 12px;}
  .watch-title{font-weight:700; font-size:14px; line-height:1.3;}
  .watch-channel{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
  }

  /* ---------- Birthdays ---------- */
  .bday-list{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  @media (max-width:700px){ .bday-list{grid-template-columns:1fr;} }
  .bday-item{
    background:var(--card);
    border-radius:14px;
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .bday-item.today{background:var(--gold);}
  .bday-item.today .bday-name, .bday-item.today .bday-date{color:#fff;}
  .bday-name{font-weight:700; font-size:14.5px;}
  .bday-date{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
  }

  footer{
    text-align:center;
    padding:30px 0 50px 0;
    color:var(--ink-soft);
    font-size:12px;
    font-weight:600;
  }

    font-family:'Space Mono', monospace;

/* ========================================================= */

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function domainOf(url){
  try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return ''; }
}
const SOURCE_NAMES = {
  'bbc.com':'BBC',
  'bbc.co.uk':'BBC',
  'nature.com':'Nature',
  'dezeen.com':'Dezeen',
  'smithsonianmag.com':'The Smithsonian',
  'youtube.com':'YouTube',
};
function sourceName(url){
  const d = domainOf(url);
  if(SOURCE_NAMES[d]) return SOURCE_NAMES[d];
  // fall back: strip TLD and capitalise, e.g. example.com -> Example
  const base = d.split('.')[0];
  return base ? base.charAt(0).toUpperCase() + base.slice(1) : d;
}
function fmtDayHeader(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' }).toUpperCase();
}

function dispatchListHtml(list){
  if(list.length===0){
    return '<div class="empty-card">Tumbleweeds. Nothing filed here yet.</div>';
  }
  const sorted = [...list].sort((a,b)=> b.date.localeCompare(a.date));
  const groups = {};
  sorted.forEach(a=>{ (groups[a.date] = groups[a.date] || []).push(a); });

  let html = '';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    html += `<div class="day-badge">${fmtDayHeader(date)}</div>`;
    groups[date].forEach(a=>{
      const fac = FAC_MAP[a.faculty] || { label:a.faculty, color:'#999' };
      const key = reactionKey(a.url);
      const saved = getReaction(key);
      const readLabel = a.read ? `${a.read} read` : '';
      html += `
        <div class="entry">
          <div class="entry-top">
            <div class="tag" style="background:${fac.color}">${fac.label}</div>
            <a class="headline" href="${a.url}" rel="noopener">${escapeHtml(a.headline)}</a>
          </div>
          <div class="entry-meta">
            ${readLabel ? `<div>${readLabel}</div>` : ''}
            <div>${escapeHtml(sourceName(a.url))}</div>
          </div>
          <div class="entry-actions">
            <button class="react-btn ${saved==='👍'?'active':''}" data-key="${key}" data-emoji="👍">👍</button>
            <button class="react-btn ${saved==='😮'?'active':''}" data-key="${key}" data-emoji="😮">😮</button>
            <button class="react-btn ${saved==='🤔'?'active':''}" data-key="${key}" data-emoji="🤔">🤔</button>
            <button class="bookmark-btn ${isBookmarked(a.url)?'active':''}" data-url="${a.url}" data-title="${escapeHtml(a.headline)}" data-faculty="${a.faculty}" data-date="${a.date}" title="Save for later">${isBookmarked(a.url)?icon('bookmarkFilled'):icon('bookmark')}</button>
            <button class="share-btn" data-url="${a.url}" data-title="${escapeHtml(a.headline)}">Share</button>
          </div>
        </div>`;
    });
  });
  return html;
}

function watchGridHtml(list, idPrefix){
  if(list.length===0){
    return '<div class="empty-card">Nothing to watch here. Yet. Patience, young padawan.</div>';
  }
  return list.map((v,i) => `
    <div class="watch-card">
      <button class="watch-thumb" data-id="${v.videoId}" data-key="${idPrefix}-${i}" aria-label="Play ${escapeHtml(v.title)}">
        <img src="https://img.youtube.com/vi/${v.videoId}/hqdefault.jpg" alt="${escapeHtml(v.title)}" loading="lazy">
        <div class="play"><span>▶</span></div>
      </button>
      <div class="watch-info">
        <div class="watch-title">${escapeHtml(v.title)}</div>
        <div class="watch-channel">${escapeHtml(v.channel)}</div>
      </div>
    </div>
  `).join('');
}

function wireWatchButtons(container){
  container.querySelectorAll('.watch-thumb').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      btn.outerHTML = `<div class="watch-thumb"><iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&playsinline=1" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
    });
  });
}

/* ---- Reactions (stored per-device only — not a shared class tally) ---- */
function reactionKey(url){ return 'reaction:' + url; }
function getReaction(key){
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
function setReaction(key, emoji){
  try{
    const current = localStorage.getItem(key);
    if(current === emoji){ localStorage.removeItem(key); return null; }
    localStorage.setItem(key, emoji);
    return emoji;
  }catch(e){ return null; }
}

/* ---- Bookmarks (stored per-device only, via localStorage) ---- */
function getBookmarks(){
  try{ return JSON.parse(localStorage.getItem('bookmarks') || '[]'); }catch(e){ return []; }
}
function isBookmarked(url){
  return getBookmarks().some(b => b.url === url);
}
function toggleBookmark(item){
  let list = getBookmarks();
  const exists = list.some(b => b.url === item.url);
  if(exists){
    list = list.filter(b => b.url !== item.url);
  } else {
    list.push(item);
  }
  try{ localStorage.setItem('bookmarks', JSON.stringify(list)); }catch(e){}
  return !exists;
}

/* ---- Share ---- */
function shareEntry(url, title){
  if(navigator.share){
    navigator.share({ title, url }).catch(()=>{});
  } else {
    try{ navigator.clipboard.writeText(url); }catch(e){}
    window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(title), '_blank');
  }
}

function wireEntryActions(container){
  container.querySelectorAll('.react-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = btn.dataset.key;
      const emoji = btn.dataset.emoji;
      const result = setReaction(key, emoji);
      container.querySelectorAll(`.react-btn[data-key="${CSS.escape(key)}"]`).forEach(b=>{
        b.classList.toggle('active', result === b.dataset.emoji);
      });
    });
  });
  container.querySelectorAll('.bookmark-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const item = { url: btn.dataset.url, headline: btn.dataset.title, faculty: btn.dataset.faculty, date: btn.dataset.date };
      const nowSaved = toggleBookmark(item);
      btn.classList.toggle('active', nowSaved);
      btn.innerHTML = nowSaved ? ICONS.bookmarkFilled : ICONS.bookmark;
    });
  });
  container.querySelectorAll('.share-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      shareEntry(btn.dataset.url, btn.dataset.title);
    });
  });
}

async function loadWeather(){
  const card = document.getElementById('weatherCard');
  if(!card) return;
  const randomTwo = [...WORLD_CITIES].sort(()=> Math.random() - 0.5).slice(0, 2);
  const locations = [{ city:"Tashkent", country:"Uzbekistan", lat:41.2995, lon:69.2401 }, ...randomTwo];
  const lats = locations.map(l => l.lat).join(',');
  const lons = locations.map(l => l.lon).join(',');
  try{
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current_weather=true&wind_speed_unit=kn`);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    const results = Array.isArray(data) ? data : [data];
    const rows = results.map((r, i) => {
      const loc = locations[i];
      const cw = r.current_weather;
      if(!cw) return '';
      const [icon, label] = WEATHER_CODES[cw.weathercode] || ['🌡️','Current conditions'];
      return `
        <div class="weather-row">
          <div class="weather-city">${escapeHtml(loc.city)}, ${escapeHtml(loc.country)}</div>
          <div class="weather-detail">${icon} ${Math.round(cw.temperature)}°C — ${escapeHtml(label)}, wind ${Math.round(cw.windspeed)} kn</div>
        </div>
      `;
    }).join('');
    card.innerHTML = rows || '<div class="otd-text">Couldn\'t load the weather — try refreshing.</div>';
  }catch(e){
    card.innerHTML = '<div class="otd-text">Couldn\'t load the weather — try refreshing.</div>';
  }
}
async function loadOnThisDay(){
  const card = document.getElementById('otdCard');
  if(!card) return;
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  try{
    const res = await fetch(`https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/selected/${mm}/${dd}`);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    const pool = data.selected || [];
    const clean = pool.filter(p => {
      const t = (p.text || '').toLowerCase();
      return !OTD_NEGATIVE_KEYWORDS.some(k => t.includes(k));
    });
    let candidates = clean.filter(p => OTD_POSITIVE_KEYWORDS.some(k => (p.text || '').toLowerCase().includes(k)));
    if(candidates.length === 0) candidates = clean;
    if(candidates.length === 0) throw new Error('no safe candidates for today');
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    const page = pick.pages && pick.pages[0];
    const link = page && page.content_urls && page.content_urls.desktop ? page.content_urls.desktop.page : null;
    card.innerHTML = `
      <div class="otd-year">${escapeHtml(String(pick.year))}</div>
      <div class="otd-text">${escapeHtml(pick.text)}${link ? ` — <a href="${link}" rel="noopener">read more</a>` : ''}</div>
    `;
  }catch(e){
    // Fallback only — today's live feed had nothing safe/available. Not date-matched, just keeps the card from being empty.
    const pick = ON_THIS_DAY_FACTS[Math.floor(Math.random() * ON_THIS_DAY_FACTS.length)];
    card.innerHTML = `
      <div class="otd-year">${escapeHtml(pick.year)}</div>
      <div class="otd-text">${escapeHtml(pick.text)}</div>
    `;
  }
}

function wireSearch(container){
  const input = container.querySelector('#searchInput');
  const results = container.querySelector('#searchResults');
  if(!input || !results) return;
  input.addEventListener('input', ()=>{
    const q = input.value.trim().toLowerCase();
    if(q.length === 0){
      results.innerHTML = `<div class="empty-card">Go on, type something. We both know you're curious. (${DISPATCHES.length} dispatches waiting)</div>`;
      return;
    }
    const matches = DISPATCHES.filter(a => a.headline.toLowerCase().includes(q));
    results.innerHTML = dispatchListHtml(matches);
    wireEntryActions(results);
  });
}

    document.body.style.overflow = 'hidden';
    const slide = track.children[idx];
    if(slide) slide.scrollIntoView({ block:'nearest', inline:'center' });
  }
  function closeLightbox(){
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }
  container.querySelectorAll('.photo-item').forEach(btn=>{
    btn.addEventListener('click', ()=> openAt(parseInt(btn.dataset.index, 10)));
  });
  closeBtn.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e)=>{ if(e.target === lightbox) closeLightbox(); });
}

function birthdaysHtml(){
  if(BIRTHDAYS.length===0){
    return '<div class="empty-card">No birthdays yet. Nobody\'s been born apparently.</div>';
  }
  const today = new Date();
  const todayM = today.getMonth()+1, todayD = today.getDate();
  const withNext = BIRTHDAYS.map(b=>{
    let next = new Date(today.getFullYear(), b.month-1, b.day);
    if(next < new Date(today.getFullYear(), todayM-1, todayD)){
      next = new Date(today.getFullYear()+1, b.month-1, b.day);
    }
    return {...b, next};
  }).sort((a,b)=> a.next - b.next);
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `<div class="bday-list">${withNext.map(b=>{
    const isToday = b.month===todayM && b.day===todayD;
    return `<div class="bday-item ${isToday?'today':''}">
      <span class="bday-name">${escapeHtml(b.name)}${isToday ? ' 🎉' : ''}</span>
      <span class="bday-date">${b.day} ${monthNames[b.month-1]}</span>
    </div>`;
  }).join('')}</div>`;
}

}

/* ---- Toast + confetti (playful feedback, no backend needed) ---- */
function showToast(msg){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3A2A1E;color:#fff;padding:12px 20px;border-radius:999px;font-family:"Nunito",sans-serif;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.25);max-width:86vw;text-align:center;';
  document.body.appendChild(t);
  setTimeout(()=>{
    t.style.transition = 'opacity .4s';
    t.style.opacity = '0';
    setTimeout(()=> t.remove(), 400);
  }, 2600);
}
function spawnConfettiParticle(colors){
  const p = document.createElement('div');
  const size = 6 + Math.random()*8;
  const startX = Math.random()*100;
  const drift = (Math.random()*60 - 30); // sideways drift, vw
  const fallDuration = 1.6 + Math.random()*1.2;
  p.style.cssText = `position:fixed;left:${startX}vw;top:-10px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};z-index:9999;pointer-events:none;transition:transform ${fallDuration}s cubic-bezier(.25,.46,.45,.94), opacity ${fallDuration}s ease-in;`;
  document.body.appendChild(p);
  requestAnimationFrame(()=>{
    p.style.transform = `translate(${drift}vw, ${90+Math.random()*20}vh) rotate(${(Math.random()>0.5?1:-1)*(360+Math.random()*720)}deg)`;
    p.style.opacity = '0';
  });
  setTimeout(()=> p.remove(), fallDuration*1000 + 100);
}
function burstConfetti(){
  const colors = ['#F2622E','#F0A93C','#2F8F7A','#B0446E','#3C6FA6','#1FA8A3','#8B5E3C'];
  if(navigator.vibrate){
    try{ navigator.vibrate([80, 40, 80, 40, 200]); }catch(e){}
  }
  const waveInterval = setInterval(()=>{
    for(let i=0;i<20;i++) spawnConfettiParticle(colors);
  }, 150);
  setTimeout(()=> clearInterval(waveInterval), 2000);
}

/* ---- Live clock ---- */
function pad(n){ return n.toString().padStart(2,'0'); }

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('clockDate').textContent =
    `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
}

/* ---- Weekend countdown ---- */
function isWeekendNow(now){
  const day = now.getDay();
  if(day === 5) return now.getHours() >= 18;
  return day === 6 || day === 0;
}
function nextFridayEighteen(now){
  const d = new Date(now);
  d.setHours(18,0,0,0);
  const day = d.getDay();
  let diffDays = (5 - day + 7) % 7;
  if(diffDays === 0 && now.getTime() > d.getTime()){ diffDays = 7; }
  d.setDate(d.getDate() + diffDays);
  return d;
}
function updateWeekendCountdown(){
  const now = new Date();
  const el = document.getElementById('weekendCountdown');
  if(isWeekendNow(now)){
    el.textContent = "it's here 🎉";
    try{
      if(!sessionStorage.getItem('weekendCelebrated')){
        sessionStorage.setItem('weekendCelebrated', '1');
        burstConfetti();
        showToast("🎉 WEEKEND. Go outside. Or don't.");
      }
    }catch(e){}
    return;
  }
  const target = nextFridayEighteen(now);
  let diff = Math.max(0, target - now);
  const dd = Math.floor(diff / 86400000); diff -= dd*86400000;
  const hh = Math.floor(diff / 3600000); diff -= hh*3600000;
  const mm = Math.floor(diff / 60000); diff -= mm*60000;
  const ss = Math.floor(diff / 1000);
  el.textContent = `${pad(dd)}:${pad(hh)}:${pad(mm)}:${pad(ss)}`;
}

updateClock();
updateWeekendCountdown();
setInterval(updateClock, 1000);
setInterval(updateWeekendCountdown, 1000);
