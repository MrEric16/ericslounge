<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Eric's Lounge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF2E4;
    --cream-2:#F6E7CE;
    --card:#FFFCF6;
    --ink:#3A2A1E;
    --ink-soft:#7A6A57;
    --coral:#F2622E;
    --coral-dark:#D6491A;
    --gold:#F0A93C;
    --teal:#2F8F7A;
    --line:#EAD9BB;
    --arsenal:#EF0107;

    --f-jur:#6B5B95;
    --f-ir:#2F7A99;
    --f-econ:#C98A2C;
    --f-biz:#4C8C5B;
    --f-sci:#1F8A7A;
    --f-it:#3C6FA6;
    --f-psy:#B0446E;
    --f-des:#C2601F;
    --f-hist:#8B5E3C;
    --f-travel:#1FA8A3;
    --f-tech:#4A5568;
    --f-sport:#1E8E5A;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Nunito', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Baloo 2', sans-serif; margin:0;}
  a{color:inherit;}

  .wrap{max-width:1040px; margin:0 auto; padding:0 22px;}

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg, #FDECD8 0%, #FBDCC0 60%, #F7CBA8 100%);
    padding:36px 0 26px 0;
    border-bottom:4px solid var(--card);
  }
  .masthead{text-align:center;}
  h1.title{
    font-size:clamp(38px,7vw,62px);
    font-weight:800;
    color:var(--coral-dark);
    letter-spacing:-0.01em;
    cursor:pointer;
  }
  .subtitle{
    font-size:16px;
    font-weight:600;
    color:var(--ink-soft);
    margin-top:8px;
  }

  .stat-row{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin-top:24px;
  }
  .stat-pill{
    background:var(--card);
    border-radius:999px;
    padding:10px 20px;
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .stat-pill .label{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
  }
  .stat-pill .value{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:16px;
    color:var(--coral-dark);
  }
  .stat-pill.weekend .value{color:var(--teal);}

  /* ---------- Section shell ---------- */
  section{padding:34px 0;}
  .section-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .section-head h2{
    font-size:22px;
    color:var(--ink);
  }
  .section-head .emoji{font-size:22px;}
  .section-sub{
    font-size:13px;
    color:var(--ink-soft);
    font-weight:600;
    margin-left:auto;
  }
  .section-link{
    font-size:13px;
    font-weight:700;
    color:var(--coral-dark);
    text-decoration:none;
    margin-left:auto;
    cursor:pointer;
  }
  .section-link:hover{text-decoration:underline;}

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-weight:700;
    font-size:14px;
    color:var(--coral-dark);
    text-decoration:none;
    cursor:pointer;
    margin-bottom:6px;
  }
  .back-link:hover{text-decoration:underline;}

  /* ---------- Faculty tiles ---------- */
  .faculties{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }
  @media (max-width:700px){ .faculties{grid-template-columns:repeat(2,1fr);} }

  .fac-tile{
    background:var(--card);
    border:none;
    border-radius:18px;
    padding:16px 16px;
    cursor:pointer;
    text-align:left;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
    transition:transform .12s ease, box-shadow .12s ease;
    font-family:'Nunito', sans-serif;
    text-decoration:none;
    display:block;
    color:var(--ink);
  }
  .fac-tile:hover{transform:translateY(-2px); box-shadow:0 6px 0 rgba(58,42,30,.1);}
  .fac-tile .dot{
    width:10px; height:10px; border-radius:50%;
    display:inline-block; margin-right:8px;
  }
  .fac-tile .name{font-weight:700; font-size:14.5px;}
  .fac-tile .count{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
    display:block;
  }
  .fac-tile.all{background:var(--ink); grid-column:1/-1;}
  .fac-tile.all .name{color:#fff;}
  .fac-tile.all .count{color:#D8CBBB;}

  /* ---------- Sports hub tiles: uniform size, dead-centered ---------- */
  .sport-hub-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .sport-hub-tile{
    background:var(--card);
    border:none;
    border-radius:18px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
    transition:transform .12s ease, box-shadow .12s ease;
    font-family:'Nunito', sans-serif;
    text-decoration:none;
    color:var(--ink);
    height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:12px;
  }
  .sport-hub-tile:hover{transform:translateY(-2px); box-shadow:0 6px 0 rgba(58,42,30,.1);}
  .sport-hub-tile .name{font-weight:700; font-size:15px; line-height:1.25;}

  /* ---------- Feed ---------- */
  .day-badge{
    display:inline-block;
    background:var(--ink);
    color:#fff;
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:.05em;
    padding:5px 14px;
    border-radius:999px;
    margin:22px 0 12px 0;
  }
  .day-badge:first-child{margin-top:0;}

  .entry{
    display:flex;
    flex-direction:column;
    gap:8px;
    background:var(--card);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .entry-top{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .tag{
    flex:0 0 120px;
    width:120px;
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:.04em;
    text-transform:uppercase;
    padding:6px 8px;
    border-radius:999px;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  a.headline{
    flex:1;
    min-width:0;
    font-weight:700;
    font-size:16px;
    color:var(--ink);
    text-decoration:none;
    line-height:1.35;
  }
  a.headline:hover{color:var(--coral);}
  .entry-meta{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-left:134px;
    line-height:1.6;
  }
  .entry-actions{
    display:flex;
    align-items:center;
    gap:6px;
    margin-left:134px;
  }
  .react-btn{
    background:var(--cream-2);
    border:none;
    border-radius:999px;
    padding:5px 9px;
    font-size:14px;
    cursor:pointer;
    line-height:1;
  }
  .react-btn.active{background:var(--coral); }
  .share-btn{
    background:none;
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px 11px;
    font-size:11px;
    font-family:'Space Mono', monospace;
    color:var(--ink-soft);
    cursor:pointer;
    margin-left:auto;
  }
  .share-btn:hover{color:var(--coral);}

  /* ---------- Search ---------- */
  .search-input{
    width:100%;
    padding:14px 16px;
    border-radius:16px;
    border:none;
    background:var(--card);
    font-family:'Nunito', sans-serif;
    font-size:15px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .search-input:focus{outline:2px solid var(--coral);}
  .search-icon-btn{
    background:var(--card);
    border:none;
    border-radius:999px;
    width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }

  /* ---------- On this day ---------- */
  .otd-card{
    background:var(--ink);
    color:#fff;
    border-radius:20px;
    padding:22px;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .otd-card .otd-year{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--gold);
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  .otd-card .otd-text{
    margin-top:8px;
    font-size:15px;
    line-height:1.5;
    font-weight:600;
  }
  .otd-card a{color:#fff; text-decoration:underline;}



  /* ---------- Random tile ---------- */
  .random-tile{
    background:var(--coral);
    color:#fff;
    border:none;
    border-radius:20px;
    padding:20px 22px;
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    text-align:left;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
    font-family:'Nunito', sans-serif;
  }
  .random-tile .icon{font-size:26px;}
  .random-tile .title{font-weight:800; font-size:17px;}
  .random-tile .sub{font-size:12px; color:#FBDFCF; font-weight:600; margin-top:2px;}

  .empty-card{
    background:var(--card);
    border-radius:18px;
    padding:34px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-weight:600;
    font-size:14px;
  }

  /* ---------- Sports ---------- */
  .sports-card{
    background:var(--card);
    border-radius:20px;
    padding:20px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .sports-header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
  }
  .sports-header .crest{
    width:144px; height:144px;
    display:flex; align-items:center; justify-content:center;
  }
  .sports-header .crest img{width:100%; height:100%; object-fit:contain;}
  .sports-header .name{font-weight:800; font-size:17px;}
  .sports-header .sub{font-size:12px; color:var(--ink-soft); font-weight:600;}

  .next-fixture{
    background:var(--cream-2);
    border-radius:14px;
    padding:12px 14px;
    font-size:13.5px;
    font-weight:700;
  }
  .next-fixture .label{
    display:block;
    font-family:'Space Mono', monospace;
    font-size:10px;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:4px;
    font-weight:400;
  }

  /* ---------- Student of the week ---------- */
  .sotw-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:14px;
  }
  .sotw-card{
    background:var(--card);
    border-radius:20px;
    padding:22px;
    display:flex;
    gap:18px;
    align-items:center;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .sotw-photo{
    width:96px; height:96px;
    border-radius:50%;
    background:var(--cream-2);
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    border:3px solid var(--gold);
  }
  .sotw-photo img{width:100%; height:100%; object-fit:cover;}
  .sotw-photo .placeholder{font-size:34px;}
  .sotw-name{font-weight:800; font-size:19px;}
  .sotw-note{color:var(--ink-soft); font-size:13.5px; margin-top:4px; font-weight:600;}

  /* ---------- Recommend ---------- */
  .rec-list{display:flex; flex-direction:column; gap:10px;}
  .rec-item{
    background:var(--card);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .rec-item a{
    font-weight:700;
    font-size:15px;
    text-decoration:none;
    color:var(--ink);
  }
  .rec-item a:hover{color:var(--coral);}
  .rec-item .rec-note{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:4px;
    font-weight:600;
  }

  /* ---------- Watch ---------- */
  .watch-tile{
    background:var(--ink);
    color:#fff;
    border-radius:20px;
    padding:26px 22px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .watch-tile .icon{font-size:30px;}
  .watch-tile .title{font-weight:800; font-size:19px;}
  .watch-tile .sub{font-size:13px; color:#D8CBBB; font-weight:600; margin-top:2px;}

  /* ---------- Photo Library ---------- */
  .photo-tile{
    background:var(--f-des);
    color:#fff;
    border-radius:20px;
    padding:26px 22px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .photo-tile .icon{font-size:30px;}
  .photo-tile .title{font-weight:800; font-size:19px;}
  .photo-tile .sub{font-size:13px; color:#FBE4D1; font-weight:600; margin-top:2px;}

  .photo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:10px;
  }
  .photo-item{
    display:block;
    text-decoration:none;
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .photo-item img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
  }
  .photo-caption{
    padding:8px 10px 10px 10px;
    font-size:12px;
    font-weight:700;
    color:var(--ink);
    line-height:1.3;
  }

  .watch-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
  }
  .watch-card{
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
    display:block;
  }
  .watch-thumb{
    width:100%;
    aspect-ratio:16/9;
    background:var(--cream-2);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    border:none;
    padding:0;
  }
  .watch-thumb iframe{width:100%; height:100%; border:none; display:block;}
  .watch-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .watch-thumb .play{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.15);
  }
  .watch-thumb .play span{
    width:44px; height:44px;
    border-radius:50%;
    background:var(--coral);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }
  .watch-info{padding:10px 12px 14px 12px;}
  .watch-title{font-weight:700; font-size:14px; line-height:1.3;}
  .watch-channel{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
  }

  /* ---------- Birthdays ---------- */
  .bday-list{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  @media (max-width:700px){ .bday-list{grid-template-columns:1fr;} }
  .bday-item{
    background:var(--card);
    border-radius:14px;
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .bday-item.today{background:var(--gold);}
  .bday-item.today .bday-name, .bday-item.today .bday-date{color:#fff;}
  .bday-name{font-weight:700; font-size:14.5px;}
  .bday-date{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
  }

  footer{
    text-align:center;
    padding:30px 0 50px 0;
    color:var(--ink-soft);
    font-size:12px;
    font-weight:600;
  }

  /* ---------- Watch page: white + red theme (layout unchanged) ---------- */
  body.theme-watch{background:#FFFFFF;}
  body.theme-watch .back-link{color:#D6191A;}
  body.theme-watch .section-head h2{color:#1A1A1A;}
  body.theme-watch .section-head .emoji{filter:none;}
  body.theme-watch .fac-tile{
    background:#FFFFFF;
    border:1.5px solid #D6191A;
  }
  body.theme-watch .fac-tile .count{color:#D6191A;}
  body.theme-watch .fac-tile.all{background:#D6191A; border:none;}
  body.theme-watch .fac-tile.all .name{color:#fff;}
  body.theme-watch .fac-tile.all .count{color:#FBD3D3;}
  body.theme-watch .watch-card{
    background:#FFFFFF;
    border:1.5px solid #EFD0D0;
    box-shadow:none;
  }
  body.theme-watch .watch-thumb .play{
    background:rgba(214,25,26,.88);
  }
  body.theme-watch .watch-channel{color:#B33;}

  /* ---------- Sports tables ---------- */
  .sports-tile{
    background:var(--teal);
    color:#fff;
    border-radius:20px;
    padding:26px 22px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .sports-tile .icon{font-size:30px;}
  .sports-tile .title{font-weight:800; font-size:19px;}
  .sports-tile .sub{font-size:13px; color:#D8F0E9; font-weight:600; margin-top:2px;}

  .league-block{margin-bottom:28px;}
  .league-head{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:4px;
  }
  .league-head .flag{font-size:18px;}
  .league-head h3{font-family:'Baloo 2', sans-serif; font-weight:800; font-size:17px; color:var(--ink);}
  .league-note{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .league-table-wrap{overflow-x:auto; border-radius:14px; box-shadow:0 2px 0 rgba(58,42,30,.06); margin-bottom:14px;}
  .league-table-wrap:last-child{margin-bottom:0;}
  .division-label{
    font-family:'Space Mono', monospace;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--teal);
    margin:12px 0 6px 0;
  }
  table.league-table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    font-size:12.5px;
    min-width:480px;
  }
  table.league-table th{
    font-family:'Space Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.03em;
    color:var(--ink-soft);
    text-align:center;
    padding:8px 6px;
    border-bottom:1.5px solid var(--line);
  }
  table.league-table th:first-child, table.league-table td:first-child{text-align:left; padding-left:12px;}
  table.league-table td{
    padding:7px 6px;
    text-align:center;
    border-bottom:1px solid var(--line);
    font-weight:600;
  }
  table.league-table td.team-name{
    text-align:left;
    font-weight:700;
    white-space:nowrap;
  }
  table.league-table td.pos{color:var(--ink-soft); font-weight:700;}
  table.league-table tr:last-child td{border-bottom:none;}
</style>
</head>
<body>

<header>
  <div class="wrap masthead">
    <h1 class="title" id="titleLink">Mr Eric's Lounge</h1>
    <div class="subtitle" id="subtitleText">Today's news, fresh off the press</div>
    <div class="stat-row">
      <div class="stat-pill">
        <span class="label">Local time</span>
        <span class="value" id="clock">--:--:--</span>
      </div>
      <div class="stat-pill weekend">
        <span class="label">Weekend in</span>
        <span class="value" id="weekendCountdown">--:--:--:--</span>
      </div>
      <a class="search-icon-btn" href="#search" title="Search">🔍</a>
    </div>
  </div>
</header>

<div class="wrap" id="app"></div>

<footer></footer>

<script>
/* =========================================================
   EDITABLE CONTENT — everything below is plain data.
   To add/change something, edit the relevant array/object.
   ========================================================= */

const FACULTIES = [
  { key:'jurisprudence', label:'Jurisprudence', color:'var(--f-jur)' },
  { key:'international-relations', label:"Int'l Relations", color:'var(--f-ir)' },
  { key:'economics', label:'Economics', color:'var(--f-econ)' },
  { key:'business', label:'Business', color:'var(--f-biz)' },
  { key:'science', label:'Science', color:'var(--f-sci)' },
  { key:'it', label:'IT', color:'var(--f-it)' },
  { key:'psychology', label:'Psychology', color:'var(--f-psy)' },
  { key:'design', label:'Design', color:'var(--f-des)' },
  { key:'history', label:'History', color:'var(--f-hist)' },

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function domainOf(url){
  try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return ''; }
}
const SOURCE_NAMES = {
  'bbc.com':'BBC',
  'bbc.co.uk':'BBC',
  'nature.com':'Nature',
  'dezeen.com':'Dezeen',
  'smithsonianmag.com':'The Smithsonian',
  'youtube.com':'YouTube',
};
function sourceName(url){
  const d = domainOf(url);
  if(SOURCE_NAMES[d]) return SOURCE_NAMES[d];
  // fall back: strip TLD and capitalise, e.g. example.com -> Example
  const base = d.split('.')[0];
  return base ? base.charAt(0).toUpperCase() + base.slice(1) : d;
}
function fmtDayHeader(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' }).toUpperCase();
}

function dispatchListHtml(list){
  if(list.length===0){
    return '<div class="empty-card">Tumbleweeds. Nothing filed here yet.</div>';
  }
  const sorted = [...list].sort((a,b)=> b.date.localeCompare(a.date));
  const groups = {};
  sorted.forEach(a=>{ (groups[a.date] = groups[a.date] || []).push(a); });

  let html = '';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    html += `<div class="day-badge">${fmtDayHeader(date)}</div>`;
    groups[date].forEach(a=>{
      const fac = FAC_MAP[a.faculty] || { label:a.faculty, color:'#999' };
      const key = reactionKey(a.url);
      const saved = getReaction(key);
      const readLabel = a.read ? `${a.read} read` : '';
      html += `
        <div class="entry">
          <div class="entry-top">
            <div class="tag" style="background:${fac.color}">${fac.label}</div>
            <a class="headline" href="${a.url}" rel="noopener">${escapeHtml(a.headline)}</a>
          </div>
          <div class="entry-meta">
            ${readLabel ? `<div>${readLabel}</div>` : ''}
            <div>${escapeHtml(sourceName(a.url))}</div>
          </div>
          <div class="entry-actions">
            <button class="react-btn ${saved==='👍'?'active':''}" data-key="${key}" data-emoji="👍">👍</button>
            <button class="react-btn ${saved==='😮'?'active':''}" data-key="${key}" data-emoji="😮">😮</button>

/* ---- Reactions (stored per-device only — not a shared class tally) ---- */
function reactionKey(url){ return 'reaction:' + url; }
function getReaction(key){
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
function setReaction(key, emoji){
  try{
    const current = localStorage.getItem(key);
    if(current === emoji){ localStorage.removeItem(key); return null; }
    localStorage.setItem(key, emoji);
    return emoji;
  }catch(e){ return null; }
}

/* ---- Share ---- */
function shareEntry(url, title){
  if(navigator.share){
    navigator.share({ title, url }).catch(()=>{});
  } else {
    try{ navigator.clipboard.writeText(url); }catch(e){}
    window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(title), '_blank');
  }
}

function wireEntryActions(container){
  container.querySelectorAll('.react-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = btn.dataset.key;
      const emoji = btn.dataset.emoji;
      const result = setReaction(key, emoji);
      container.querySelectorAll(`.react-btn[data-key="${CSS.escape(key)}"]`).forEach(b=>{
        b.classList.toggle('active', result === b.dataset.emoji);
      });
    });
  });
  container.querySelectorAll('.share-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      shareEntry(btn.dataset.url, btn.dataset.title);
    });
  });
}

/* ---- On This Day (Wikipedia public API, fetched client-side) ---- */
const OTD_NEGATIVE_KEYWORDS = ['war','bomb','attack','kill','murder','assassin','invas','massacre','genocide','coup','riot','terroris','execut','died','death','dead','crash','disaster','earthquake','explosion','shoot','holocaust','slave','conflict','battle','siege','uprising','famine','plague','epidemic','collapse','sank','sinks','sinking','tsunami','hurricane','flood','fire kill','violence','abuse','captur','prison','hostage','revolt','rebellion'];
const OTD_POSITIVE_KEYWORDS = ['discover','invent','launch','first','patent','award','achiev','breakthrough','found','open','premiere','publish','record','moon','space','vaccine','cure','wins','won','elect','peace','independence','celebrat','anniversary'];
const OTD_FALLBACK = [
  { year:"1969", text:"Apollo 11 entered lunar orbit, a day before Neil Armstrong and Buzz Aldrin became the first humans to walk on the Moon." },
  { year:"1928", text:"Alexander Fleming returned from holiday to find a mould had wiped out bacteria in a petri dish he'd left out — the accidental discovery behind penicillin." },
  { year:"1990", text:"The Hubble Space Telescope sent back its first images of deep space, transforming what humanity could see of the universe." },
  { year:"1876", text:"Alexander Graham Bell filed the patent that would become the telephone, changing how humans communicate forever." },
  { year:"1961", text:"Yuri Gagarin became the first human in space, orbiting Earth aboard Vostok 1." },
  { year:"1908", text:"Ford's Model T rolled off the production line for the first time, making cars affordable for ordinary people." },
  { year:"1953", text:"James Watson and Francis Crick's paper describing the structure of DNA was published, one of the most important discoveries in biology." },
  { year:"1928", text:"John Logie Baird gave the first public demonstration of colour television." },
  { year:"1969", text:"The first ATM opened for public use, letting people withdraw cash without a bank teller." },
  { year:"1903", text:"The Wright brothers' Flyer completed the first sustained, controlled flight of a powered aircraft." },
];
async function loadOnThisDay(){
  const card = document.getElementById('otdCard');
  if(!card) return;
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  try{
    const res = await fetch(`https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/selected/${mm}/${dd}`);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    const pool = data.selected || [];
    const clean = pool.filter(p => {
      const t = (p.text || '').toLowerCase();
      return !OTD_NEGATIVE_KEYWORDS.some(k => t.includes(k));
    });
    let candidates = clean.filter(p => OTD_POSITIVE_KEYWORDS.some(k => (p.text || '').toLowerCase().includes(k)));
    if(candidates.length === 0) candidates = clean;
    if(candidates.length === 0) throw new Error('no safe candidates');
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    const page = pick.pages && pick.pages[0];
    const link = page && page.content_urls && page.content_urls.desktop ? page.content_urls.desktop.page : null;
    card.innerHTML = `
      <div class="otd-year">${escapeHtml(String(pick.year))}</div>
      <div class="otd-text">${escapeHtml(pick.text)}${link ? ` — <a href="${link}" rel="noopener">read more</a>` : ''}</div>
    `;
  }catch(e){
    const pick = OTD_FALLBACK[Math.floor(Math.random() * OTD_FALLBACK.length)];
    card.innerHTML = `
      <div class="otd-year">${escapeHtml(pick.year)}</div>
      <div class="otd-text">${escapeHtml(pick.text)}</div>
    `;
  }
}

  if(parts.length === 0){

    html = viewFaculty(parts[1]);

    html = viewWatchHub();
  } else if(parts[0] === 'watch' && parts[1]){
    html = viewWatchFaculty(parts[1]);
  } else if(parts[0] === 'search'){
    html = viewSearch();
  } else if(parts[0] === 'photos'){
    html = viewPhotos();
  } else if(parts[0] === 'sports' && parts[1] === 'tables'){
    html = viewSports();
  } else if(parts[0] === 'sports'){
    html = viewSportsHub();
  } else {

  app.innerHTML = html;
  document.body.classList.toggle('theme-watch', parts[0] === 'watch');
  wireWatchButtons(app);
  wireEntryActions(app);
  if(parts[0] === 'search') wireSearch(app);

  window.scrollTo(0,0);
}

  const drift = (Math.random()*60 - 30); // sideways drift, vw
  const fallDuration = 1.6 + Math.random()*1.2;
  p.style.cssText = `position:fixed;left:${startX}vw;top:-10px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};z-index:9999;pointer-events:none;transition:transform ${fallDuration}s cubic-bezier(.25,.46,.45,.94), opacity ${fallDuration}s ease-in;`;
  document.body.appendChild(p);
  requestAnimationFrame(()=>{
    p.style.transform = `translate(${drift}vw, ${90+Math.random()*20}vh) rotate(${(Math.random()>0.5?1:-1)*(360+Math.random()*720)}deg)`;
    p.style.opacity = '0';
  });
  setTimeout(()=> p.remove(), fallDuration*1000 + 100);
}
function burstConfetti(){
  const colors = ['#F2622E','#F0A93C','#2F8F7A','#B0446E','#3C6FA6','#1FA8A3','#8B5E3C'];
  if(navigator.vibrate){
    try{ navigator.vibrate([80, 40, 80, 40, 200]); }catch(e){}
  }
  const waveInterval = setInterval(()=>{
    for(let i=0;i<20;i++) spawnConfettiParticle(colors);
  }, 150);
  setTimeout(()=> clearInterval(waveInterval), 2000);
}

/* ---- Achievement toasts (session-only, playful, not a real leaderboard) ---- */
document.body.addEventListener('click', (e)=>{
  const link = e.target.closest('a.headline');
  if(!link) return;
  try{
    let count = parseInt(sessionStorage.getItem('dispatchOpens') || '0', 10) + 1;
    sessionStorage.setItem('dispatchOpens', String(count));
  }catch(err){}
});
function checkAchievements(){
  try{
    const count = parseInt(sessionStorage.getItem('dispatchOpens') || '0', 10);
    const milestones = [3, 5, 10, 20];
    const shown = JSON.parse(sessionStorage.getItem('milestonesShown') || '[]');
    for(const m of milestones){
      if(count >= m && !shown.includes(m)){
        shown.push(m);
        sessionStorage.setItem('milestonesShown', JSON.stringify(shown));
        showToast(`🔥 ${m} dispatches opened this session. Certified curious.`);
        break;
      }
    }
  }catch(e){}
}

/* ---- Easter egg: tap the title 5 times fast ---- */
let titleTapCount = 0;
let titleTapTimer = null;
document.getElementById('titleLink').addEventListener('click', ()=>{

/* ---- Live clock ---- */
function pad(n){ return n.toString().padStart(2,'0'); }

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

/* ---- Weekend countdown ---- */
function isWeekendNow(now){
  const day = now.getDay();
  if(day === 5) return now.getHours() >= 18;
  return day === 6 || day === 0;
}
function nextFridayEighteen(now){
  const d = new Date(now);
  d.setHours(18,0,0,0);
  const day = d.getDay();
  let diffDays = (5 - day + 7) % 7;
  if(diffDays === 0 && now.getTime() > d.getTime()){ diffDays = 7; }
  d.setDate(d.getDate() + diffDays);
  return d;
}
function updateWeekendCountdown(){
  const now = new Date();
  const el = document.getElementById('weekendCountdown');
  if(isWeekendNow(now)){
    el.textContent = "it's here 🎉";
    try{
      if(!sessionStorage.getItem('weekendCelebrated')){
        sessionStorage.setItem('weekendCelebrated', '1');
        burstConfetti();
        showToast("🎉 WEEKEND. Go outside. Or don't.");
      }
    }catch(e){}
    return;
  }
  const target = nextFridayEighteen(now);
  let diff = Math.max(0, target - now);
  const dd = Math.floor(diff / 86400000); diff -= dd*86400000;
  const hh = Math.floor(diff / 3600000); diff -= hh*3600000;
  const mm = Math.floor(diff / 60000); diff -= mm*60000;
  const ss = Math.floor(diff / 1000);
  el.textContent = `${pad(dd)}:${pad(hh)}:${pad(mm)}:${pad(ss)}`;
}

updateClock();
updateWeekendCountdown();
setInterval(updateClock, 1000);
setInterval(updateWeekendCountdown, 1000);
</script>
