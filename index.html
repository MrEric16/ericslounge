<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Eric's Lounge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF2E4;
    --cream-2:#F6E7CE;
    --card:#FFFCF6;
    --ink:#3A2A1E;
    --ink-soft:#7A6A57;
    --coral:#F2622E;
    --coral-dark:#D6491A;
    --gold:#F0A93C;
    --teal:#2F8F7A;
    --line:#EAD9BB;
    --arsenal:#EF0107;

    --f-jur:#6B5B95;
    --f-ir:#2F7A99;
    --f-econ:#C98A2C;
    --f-biz:#4C8C5B;
    --f-sci:#1F8A7A;
    --f-it:#3C6FA6;
    --f-psy:#B0446E;
    --f-des:#C2601F;
    --f-hist:#8B5E3C;
    --f-travel:#1FA8A3;
    --f-tech:#4A5568;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Nunito', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Baloo 2', sans-serif; margin:0;}
  a{color:inherit;}

  .wrap{max-width:1040px; margin:0 auto; padding:0 22px;}

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg, #FDECD8 0%, #FBDCC0 60%, #F7CBA8 100%);
    padding:36px 0 26px 0;
    border-bottom:4px solid var(--card);
  }
  .masthead{text-align:center;}
  h1.title{
    font-size:clamp(38px,7vw,62px);
    font-weight:800;
    color:var(--coral-dark);
    letter-spacing:-0.01em;
    cursor:pointer;
  }
  .subtitle{
    font-size:16px;
    font-weight:600;
    color:var(--ink-soft);
    margin-top:8px;
  }

  .stat-row{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin-top:24px;
  }
  .stat-pill{
    background:var(--card);
    border-radius:999px;
    padding:10px 20px;
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .stat-pill .label{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
  }
  .stat-pill .value{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:16px;
    color:var(--coral-dark);
  }
  .stat-pill.weekend .value{color:var(--teal);}

  /* ---------- Section shell ---------- */
  section{padding:34px 0;}
  .section-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .section-head h2{
    font-size:22px;
    color:var(--ink);
  }
  .section-head .emoji{font-size:22px;}
  .section-sub{
    font-size:13px;
    color:var(--ink-soft);
    font-weight:600;
    margin-left:auto;
  }
  .section-link{
    font-size:13px;
    font-weight:700;
    color:var(--coral-dark);
    text-decoration:none;
    margin-left:auto;
    cursor:pointer;
  }
  .section-link:hover{text-decoration:underline;}

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-weight:700;
    font-size:14px;
    color:var(--coral-dark);
    text-decoration:none;
    cursor:pointer;
    margin-bottom:6px;
  }
  .back-link:hover{text-decoration:underline;}

  /* ---------- Faculty tiles ---------- */
  .faculties{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }
  @media (max-width:700px){ .faculties{grid-template-columns:repeat(2,1fr);} }

  .fac-tile{
    background:var(--card);
    border:none;
    border-radius:18px;
    padding:16px 16px;
    cursor:pointer;
    text-align:left;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
    transition:transform .12s ease, box-shadow .12s ease;
    font-family:'Nunito', sans-serif;
    text-decoration:none;
    display:block;
    color:var(--ink);
  }
  .fac-tile:hover{transform:translateY(-2px); box-shadow:0 6px 0 rgba(58,42,30,.1);}
  .fac-tile .dot{
    width:10px; height:10px; border-radius:50%;
    display:inline-block; margin-right:8px;
  }
  .fac-tile .name{font-weight:700; font-size:14.5px;}
  .fac-tile .count{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
    display:block;
  }
  .fac-tile.all{background:var(--ink); grid-column:1/-1;}
  .fac-tile.all .name{color:#fff;}
  .fac-tile.all .count{color:#D8CBBB;}

  /* ---------- Feed ---------- */
  .day-badge{
    display:inline-block;
    background:var(--ink);
    color:#fff;
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:.05em;
    padding:5px 14px;
    border-radius:999px;
    margin:22px 0 12px 0;
  }
  .day-badge:first-child{margin-top:0;}

  .entry{
    display:flex;
    gap:14px;
    align-items:flex-start;
    background:var(--card);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .tag{
    flex:0 0 auto;
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:.04em;
    text-transform:uppercase;
    padding:5px 10px;
    border-radius:999px;
    color:#fff;
    margin-top:2px;
    white-space:nowrap;
  }
  .entry-body{flex:1; min-width:0;}
  .entry-body a.headline{
    font-weight:700;
    font-size:16px;
    color:var(--ink);
    text-decoration:none;
    line-height:1.35;
  }
  .entry-body a.headline:hover{color:var(--coral);}
  .entry-meta{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:5px;
  }

  .empty-card{
    background:var(--card);
    border-radius:18px;
    padding:34px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-weight:600;
    font-size:14px;
  }

  /* ---------- Sports ---------- */
  .sports-card{
    background:var(--card);
    border-radius:20px;
    padding:20px;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .sports-header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
  }
  .sports-header .crest{
    width:38px; height:38px;
    border-radius:50%;
    background:var(--arsenal);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:14px;
  }
  .sports-header .name{font-weight:800; font-size:17px;}
  .sports-header .sub{font-size:12px; color:var(--ink-soft); font-weight:600;}

  .next-fixture{
    background:var(--cream-2);
    border-radius:14px;
    padding:12px 14px;
    font-size:13.5px;
    font-weight:700;
  }
  .next-fixture .label{
    display:block;
    font-family:'Space Mono', monospace;
    font-size:10px;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:4px;
    font-weight:400;
  }

  /* ---------- Student of the week ---------- */
  .sotw-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:14px;
  }
  .sotw-card{
    background:var(--card);
    border-radius:20px;
    padding:22px;
    display:flex;
    gap:18px;
    align-items:center;
    box-shadow:0 3px 0 rgba(58,42,30,.08);
  }
  .sotw-photo{
    width:96px; height:96px;
    border-radius:50%;
    background:var(--cream-2);
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    border:3px solid var(--gold);
  }
  .sotw-photo img{width:100%; height:100%; object-fit:cover;}
  .sotw-photo .placeholder{font-size:34px;}
  .sotw-name{font-weight:800; font-size:19px;}
  .sotw-note{color:var(--ink-soft); font-size:13.5px; margin-top:4px; font-weight:600;}

  /* ---------- Recommend ---------- */
  .rec-list{display:flex; flex-direction:column; gap:10px;}
  .rec-item{
    background:var(--card);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .rec-item a{
    font-weight:700;
    font-size:15px;
    text-decoration:none;
    color:var(--ink);
  }
  .rec-item a:hover{color:var(--coral);}
  .rec-item .rec-note{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:4px;
    font-weight:600;
  }

  /* ---------- Watch ---------- */
  .watch-tile{
    background:var(--ink);
    color:#fff;
    border-radius:20px;
    padding:26px 22px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    box-shadow:0 3px 0 rgba(58,42,30,.15);
  }
  .watch-tile .icon{font-size:30px;}
  .watch-tile .title{font-weight:800; font-size:19px;}
  .watch-tile .sub{font-size:13px; color:#D8CBBB; font-weight:600; margin-top:2px;}

  .watch-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
  }
  .watch-card{
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
    display:block;
  }
  .watch-thumb{
    width:100%;
    aspect-ratio:16/9;
    background:var(--cream-2);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    border:none;
    padding:0;
  }
  .watch-thumb iframe{width:100%; height:100%; border:none; display:block;}
  .watch-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .watch-thumb .play{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.15);
  }
  .watch-thumb .play span{
    width:44px; height:44px;
    border-radius:50%;
    background:var(--coral);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }
  .watch-info{padding:10px 12px 14px 12px;}
  .watch-title{font-weight:700; font-size:14px; line-height:1.3;}
  .watch-channel{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
  }

  /* ---------- Birthdays ---------- */
  .bday-list{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  @media (max-width:700px){ .bday-list{grid-template-columns:1fr;} }
  .bday-item{
    background:var(--card);
    border-radius:14px;
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 0 rgba(58,42,30,.06);
  }
  .bday-item.today{background:var(--gold);}
  .bday-item.today .bday-name, .bday-item.today .bday-date{color:#fff;}
  .bday-name{font-weight:700; font-size:14.5px;}
  .bday-date{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
  }

  footer{
    text-align:center;
    padding:30px 0 50px 0;
    color:var(--ink-soft);
    font-size:12px;
    font-weight:600;
  }
</style>
</head>

/* ========================================================= */

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function domainOf(url){
  try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return ''; }
}
function fmtDayHeader(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' }).toUpperCase();
}

function dispatchListHtml(list){
  if(list.length===0){
    return '<div class="empty-card">No dispatches filed here yet.</div>';
  }
  const sorted = [...list].sort((a,b)=> b.date.localeCompare(a.date));
  const groups = {};
  sorted.forEach(a=>{ (groups[a.date] = groups[a.date] || []).push(a); });

  let html = '';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    html += `<div class="day-badge">${fmtDayHeader(date)}</div>`;
    groups[date].forEach(a=>{
      const fac = FAC_MAP[a.faculty] || { label:a.faculty, color:'#999' };
      html += `
        <div class="entry">
          <div class="tag" style="background:${fac.color}">${fac.label}</div>
          <div class="entry-body">
            <a class="headline" href="${a.url}" rel="noopener">${escapeHtml(a.headline)}</a>
            <div class="entry-meta">${domainOf(a.url)}</div>
          </div>
        </div>`;
    });
  });
  return html;
}

function watchGridHtml(list, idPrefix){
  if(list.length===0){
    return '<div class="empty-card">No videos added here yet.</div>';
  }
  return list.map((v,i) => `
    <div class="watch-card">
      <button class="watch-thumb" data-id="${v.videoId}" data-key="${idPrefix}-${i}" aria-label="Play ${escapeHtml(v.title)}">
        <img src="https://img.youtube.com/vi/${v.videoId}/hqdefault.jpg" alt="${escapeHtml(v.title)}" loading="lazy">
        <div class="play"><span>▶</span></div>
      </button>
      <div class="watch-info">
        <div class="watch-title">${escapeHtml(v.title)}</div>
        <div class="watch-channel">${escapeHtml(v.channel)}</div>
      </div>
    </div>
  `).join('');
}

function wireWatchButtons(container){
  container.querySelectorAll('.watch-thumb').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      btn.outerHTML = `<div class="watch-thumb"><iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
    });
  });
}

function birthdaysHtml(){
  if(BIRTHDAYS.length===0){
    return '<div class="empty-card">Birthdays will appear here once the academic year starts.</div>';
  }
  const today = new Date();
  const todayM = today.getMonth()+1, todayD = today.getDate();
  const withNext = BIRTHDAYS.map(b=>{
    let next = new Date(today.getFullYear(), b.month-1, b.day);
    if(next < new Date(today.getFullYear(), todayM-1, todayD)){
      next = new Date(today.getFullYear()+1, b.month-1, b.day);
    }
    return {...b, next};
  }).sort((a,b)=> a.next - b.next);
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `<div class="bday-list">${withNext.map(b=>{
    const isToday = b.month===todayM && b.day===todayD;
    return `<div class="bday-item ${isToday?'today':''}">
      <span class="bday-name">${escapeHtml(b.name)}${isToday ? ' 🎉' : ''}</span>
      <span class="bday-date">${b.day} ${monthNames[b.month-1]}</span>
    </div>`;
  }).join('')}</div>`;
}

/* ---- Router ---- */

function renderRoute(){
  const app = document.getElementById('app');
  const hash = location.hash.replace(/^#/, '');
  const parts = hash.split('/').filter(Boolean);

  let html;
  if(parts.length === 0){
    html = viewHome();
  } else if(parts[0] === 'faculty' && parts[1]){
    html = viewFaculty(parts[1]);
  } else if(parts[0] === 'watch' && !parts[1]){
    html = viewWatchHub();
  } else if(parts[0] === 'watch' && parts[1]){
    html = viewWatchFaculty(parts[1]);
  } else {
    html = viewHome();
  }

  app.innerHTML = html;
  wireWatchButtons(app);
  window.scrollTo(0,0);
}

document.getElementById('titleLink').addEventListener('click', ()=>{ location.hash = ''; });
window.addEventListener('hashchange', renderRoute);

/* ---- Live clock ---- */
function pad(n){ return n.toString().padStart(2,'0'); }

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

/* ---- Weekend countdown ---- */
function isWeekendNow(now){
  const day = now.getDay();
  if(day === 5) return now.getHours() >= 18;
  return day === 6 || day === 0;
}
function nextFridayEighteen(now){
  const d = new Date(now);
  d.setHours(18,0,0,0);
  const day = d.getDay();
  let diffDays = (5 - day + 7) % 7;
  if(diffDays === 0 && now.getTime() > d.getTime()){ diffDays = 7; }
  d.setDate(d.getDate() + diffDays);
  return d;
}
function updateWeekendCountdown(){
  const now = new Date();
  const el = document.getElementById('weekendCountdown');
  if(isWeekendNow(now)){
    el.textContent = "it's here 🎉";
    return;
  }
  const target = nextFridayEighteen(now);
  let diff = Math.max(0, target - now);
  const dd = Math.floor(diff / 86400000); diff -= dd*86400000;
  const hh = Math.floor(diff / 3600000); diff -= hh*3600000;
  const mm = Math.floor(diff / 60000); diff -= mm*60000;
  const ss = Math.floor(diff / 1000);
  el.textContent = `${pad(dd)}:${pad(hh)}:${pad(mm)}:${pad(ss)}`;
}

updateClock();
updateWeekendCountdown();
setInterval(updateClock, 1000);
setInterval(updateWeekendCountdown, 1000);
